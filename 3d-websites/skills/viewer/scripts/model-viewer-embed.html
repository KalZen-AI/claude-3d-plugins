<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Model Viewer Embed</title>
  <!-- Google's model-viewer web component — zero JS setup required -->
  <script
    type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0/model-viewer.min.js"
  ></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    model-viewer {
      width: 100%;
      max-width: 800px;
      height: 500px;
      min-height: 300px;
      max-height: 80vh;
      background: #f5f5f5;
    }

    /* Reduce motion */
    @media (prefers-reduced-motion: reduce) {
      model-viewer {
        auto-rotate: false;
      }
    }
  </style>
</head>
<body>

<model-viewer
  src="models/product.glb"
  alt="Interactive 3D model of a ceramic coffee mug"
  camera-controls
  auto-rotate
  auto-rotate-delay="1000"
  rotation-per-second="30deg"
  shadow-intensity="1"
  environment-image="neutral"
  loading="lazy"
  poster="images/product-poster.webp"
>
  <!-- Optional: hide default progress bar -->
  <div slot="progress-bar" style="display: none;"></div>

  <!-- Optional: AR button for mobile -->
  <button slot="ar-button" style="
    position: absolute;
    bottom: 16px;
    right: 16px;
    padding: 8px 16px;
    background: #000;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.875rem;
    cursor: pointer;
  ">
    View in AR
  </button>
</model-viewer>

</body>
</html>
